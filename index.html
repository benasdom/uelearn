 <script>
      // Restore the original URL from the redirect parameter
      (function() {
        var urlParams = new URLSearchParams(window.location.search);
        var redirectPath = urlParams.get('redirect');
        
        if (redirectPath) {
          // Clean up the URL by removing the redirect parameter
          var newUrl = decodeURIComponent(redirectPath);
          window.history.replaceState(null, '', newUrl);
        }
      })();
    </script>
